name: Tests

on:
  push:
    branches: [main]
    tags: [ "v*" ]
  workflow_dispatch:
  pull_request:

env:
  CODEVIEWER_URL: ${{ vars.CODEVIEWER_URL || 'https://code.toawe.me' }}
  CARE_PUBLISH_TIMEOUT: ${{ vars.CARE_PUBLISH_TIMEOUT || '30' }}

permissions:
  id-token: write   # mint the OIDC token; the only permission that matters here
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-quality:
    strategy:
      fail-fast: false
      matrix:
        go: [ 1.26 ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Install care
        run: go install github.com/toaweme/care/cmd/care@latest

      - name: Generate care report
        run: care status --json --stdout --output report.care.json || true

      - name: Publish report
        run: |
          set -euo pipefail
          [ -s report.care.json ] || { echo "no report produced; nothing to publish"; exit 0; }
          token="$(curl -sS --max-time "$CARE_PUBLISH_TIMEOUT" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$CODEVIEWER_URL" | jq -r .value)"
          curl -fsS --max-time "$CARE_PUBLISH_TIMEOUT" -X POST "$CODEVIEWER_URL/ingest?kind=care" \
            -H "Authorization: Bearer $token" \
            --data-binary @report.care.json
          echo \n"published care report to $CODEVIEWER_URL"
version: "3"

# canonical toaweme Go test/check partial. included from the root
# taskfile.yml with flatten: true so tasks appear at the top level.
#
#   includes:
#     test:
#       taskfile: ./taskfile.test.yml
#       flatten: true
#
# all quality, security, and fix tasks delegate to `tool`.

tasks:
  test:
    desc: Run unit tests
    cmds:
      - go test -count=1 ./...

  check:
    desc: Run all checks (quality + tests + security)
    cmds:
      - tool check

  check:quality:
    desc: Run quality checks (vet, lint, config sync)
    cmds:
      - tool check quality

  check:security:
    desc: Run security checks
    cmds:
      - tool check security

  fix:
    desc: Auto-fix lint and quality issues
    cmds:
      - tool fix quality

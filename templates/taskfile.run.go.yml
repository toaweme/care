version: "3"

# canonical toaweme Go "run" partial. defines the boundary for running the
# software: build, install, clean. included from the root taskfile.yml as `run`
# and parameterized via BINARY_NAME and BUILD_PATH.
#
#   includes:
#     run:
#       taskfile: ./taskfile.run.yml
#       vars:
#         BINARY_NAME: blink
#         BUILD_PATH: ./cmd
#
# then call `task run:build`, `task run:install`.

tasks:
  run:
    desc: Build and run the binary
    cmds:
      - go run {{.BUILD_PATH}} {{.CLI_ARGS}}

  build:
    desc: Build the binary into ./bin
    cmds:
      - mkdir -p bin
      - go build -o ./bin/{{.BINARY_NAME}} {{.BUILD_PATH}}

  install:
    desc: Install the binary to $GOBIN (or $GOPATH/bin)
    cmds:
      - |
        BINDIR=$(go env GOBIN)
        if [ -z "$BINDIR" ]; then BINDIR=$(go env GOPATH)/bin; fi
        mkdir -p "$BINDIR"
        go build -o "$BINDIR/{{.BINARY_NAME}}" {{.BUILD_PATH}}
        echo "installed $BINDIR/{{.BINARY_NAME}}"

  clean:
    desc: Remove ./bin
    cmds:
      - rm -rf bin

version: 2

project_name: care

before:
  hooks:
    - go mod download

builds:
  - id: care
    main: ./cmd/care
    binary: care
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    # reproducible builds: pin the binary's build time to the commit time.
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - ids: [care]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x64
      {{- else if eq .Arch "386" }}x32
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

# keyless cosign signing of the checksums file. Verifying checksums.txt
# transitively verifies every archive listed in it, so one signature covers
# the whole release. Needs cosign in CI and an OIDC token (id-token: write).
signs:
  - id: checksum
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Homebrew distributes prebuilt binaries as casks (formulae are meant to build
# from source). `brew install toaweme/tap/care` resolves the cask unchanged on
# macOS; casks are macOS-only, so Linux users install via go/binary.
homebrew_casks:
  - name: care
    directory: Casks
    homepage: "https://github.com/toaweme/care"
    description: "Repository health and quality checker"
    # one shared tap holds a Casks/<project>.rb per project, so every
    # toaweme tool installs as `brew install toaweme/tap/<project>`.
    repository:
      owner: toaweme
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # don't push a cask for pre-release tags (e.g. v1.0.0-rc1).
    skip_upload: auto
    # the release binaries are unsigned, so macOS Gatekeeper quarantines them and
    # blocks the first run. Strip the attribute on install to match the old
    # formula's behavior (curl-fetched binaries were never quarantined).
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/care"]
          end

scoops:
  - name: care
    homepage: "https://github.com/toaweme/care"
    description: "Repository health and quality checker"
    license: Apache-2.0
    # the Windows analog of the brew tap: one shared bucket holds a
    # <project>.json per project, so every toaweme tool installs as
    # `scoop install toaweme/<project>` once the bucket is added.
    repository:
      owner: toaweme
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    # don't push a manifest for pre-release tags (e.g. v1.0.0-rc1).
    skip_upload: auto

changelog:
  # keep this false. The release notes come from care's own `--release-notes`
  # file (see release.yml), which already bypasses goreleaser's commit changelog.
  # Setting `disable: true` would ALSO make goreleaser ignore `--release-notes`
  # and ship an empty body (only release.footer survives) - that emptied v0.3.0.
  disable: false

release:
  # mark vX.Y.Z-rc / -beta / -alpha tags as GitHub pre-releases automatically.
  prerelease: auto
  # appended under care's generated release notes. Kept deliberately small so it
  # stays useful even on releases that carry only a commit or two.
  footer: |
    ## Install

    ```sh
    # go
    go install github.com/toaweme/care/cmd/care@{{ .Tag }}

    # homebrew (macos/linux)
    brew install toaweme/tap/care

    # scoop (windows)
    scoop bucket add toaweme https://github.com/toaweme/scoop-bucket
    scoop install toaweme/care

    # binary (linux x64; swap os/arch as needed)
    wget -qO- https://github.com/toaweme/care/releases/download/{{ .Tag }}/care_{{ .Version }}_linux_x64.tar.gz | tar xz
    ```

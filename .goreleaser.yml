version: 2

project_name: care

before:
  hooks:
    - go mod download

builds:
  - id: care
    main: ./cmd/care
    binary: care
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    # reproducible builds: pin the binary's build time to the commit time.
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - ids: [care]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x64
      {{- else if eq .Arch "386" }}x32
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

# keyless cosign signing of the checksums file. Verifying checksums.txt
# transitively verifies every archive listed in it, so one signature covers
# the whole release. Needs cosign in CI and an OIDC token (id-token: write).
signs:
  - id: checksum
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

brews:
  - name: care
    directory: Formula
    homepage: "https://github.com/toaweme/care"
    description: "Repository health and quality checker"
    license: "Apache-2.0"
    # one shared tap holds a Formula/<project>.rb per project, so every
    # toaweme tool installs as `brew install toaweme/tap/<project>`.
    repository:
      owner: toaweme
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # don't push a formula for pre-release tags (e.g. v1.0.0-rc1).
    skip_upload: auto
    test: |
      system "#{bin}/care", "--help"

changelog:
  # keep this false. The release notes come from care's own `--release-notes`
  # file (see release.yml), which already bypasses goreleaser's commit changelog.
  # Setting `disable: true` would ALSO make goreleaser ignore `--release-notes`
  # and ship an empty body (only release.footer survives) - that emptied v0.3.0.
  disable: false

release:
  # mark vX.Y.Z-rc / -beta / -alpha tags as GitHub pre-releases automatically.
  prerelease: auto
  # appended under care's generated release notes. Kept deliberately small so it
  # stays useful even on releases that carry only a commit or two.
  footer: |
    ## Install

    ```sh
    # go
    go install github.com/toaweme/care/cmd/care@{{ .Tag }}

    # homebrew
    brew install toaweme/tap/care

    # binary (linux x64; swap os/arch as needed)
    wget -qO- https://github.com/toaweme/care/releases/download/{{ .Tag }}/care_{{ .Version }}_linux_x64.tar.gz | tar xz
    ```

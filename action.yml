name: care
description: Install the care CLI from a verified release, run it, and optionally report and publish.
author: toaweme

branding:
  icon: check-circle
  color: green

inputs:
  version:
    description: >-
      Exact release tag to install, e.g. v0.1.0. Defaults to the ref the action
      itself was pinned to (uses: toaweme/care@v0.1.0 installs care v0.1.0), so
      the tag is the single source of truth. Pass this explicitly only when the
      action is pinned to a commit SHA or branch.
    required: false
    default: ""
  args:
    description: >-
      Optional. Run "care <args>" after install. The value is split on spaces into
      separate arguments, so "get lint --force" passes three. Empty by default, in
      which case the action only installs care for you to invoke in later steps.
      For the report flow use output/strict/publish-url instead.
    required: false
    default: ""
  output:
    description: >-
      Write the JSON report to this file path, the same as care's own --output flag
      (runs "care status --json --pretty --output <path>"). Use a "<name>.care.json"
      name (e.g. report.care.json, the default when strict or publish-url is set) -
      the .care.json suffix is the convention care reports use. A failing check still
      writes the report rather than failing the step. To gate the workflow on failing
      checks while keeping the report, set strict.
    required: false
    default: ""
  strict:
    description: >-
      true fails the workflow when any care check fails (after the report has been
      written, uploaded, and published, so the failure report is still kept). false
      (the default) reports without failing the job. Use true to gate a repo on
      quality, false to only observe.
    required: false
    default: "false"
  publish-url:
    description: >-
      Full URL to POST the JSON report to, defaulting to care's hosted dashboard at
      https://code.toawe.me/ingest?kind=care. A self-hosted codeviewer uses the same
      path on its own host, https://YOUR-HOST/ingest?kind=care. Override it for your
      own engine, or set it empty to disable publishing. The action POSTs the report
      JSON as the body with an Authorization Bearer GitHub OIDC token whose audience
      is the URL origin (scheme and host), so it needs "permissions: id-token: write"
      on the job. Without that permission publishing is skipped with a warning. Only
      runs when a report exists (set output, strict, or upload).
    required: false
    default: "https://code.toawe.me/ingest?kind=care"
  upload:
    description: >-
      Upload the report as a workflow artifact, named after the output file (e.g.
      report.care.json), so it can be downloaded from a finished run (including a
      failing one) without re-running care. Default false. The report always stays
      in the workspace and is exposed via the report-path output regardless.
    required: false
    default: "false"
  verify:
    description: >-
      Verify the cosign keyless signature on checksums.txt before trusting it.
      Keep this on. Turn it off only in air-gapped runners without network egress
      to the Sigstore transparency log.
    required: false
    default: "true"
  dir:
    description: >-
      Directory care runs in, passed through as care's --cwd. Set it for a module
      in a subdirectory with its own go.mod (e.g. a server submodule), so one repo
      can report each module from its own matrix job. The JSON report is still
      written to the workspace root, so output/upload/publish are unaffected.
      Defaults to the repository root.
    required: false
    default: "."

outputs:
  report-path:
    description: Path to the JSON report in the workspace, empty if none was produced.
    value: ${{ steps.report.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Install cosign
      if: inputs.verify == 'true'
      # v4.1.2 (https://github.com/sigstore/cosign-installer/releases/tag/v4.1.2)
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

    - name: Install care
      shell: bash
      env:
        CARE_VERSION: ${{ inputs.version }}
        CARE_ACTION_REF: ${{ github.action_ref }}
        CARE_VERIFY: ${{ inputs.verify }}
      run: |
        set -euo pipefail

        # the tag drives everything: explicit input wins, else the ref the action
        # was pinned to (GITHUB_ACTION_REF). github.action_ref is passed in env so
        # it survives the action running from its own checkout.
        ref="${CARE_VERSION:-$CARE_ACTION_REF}"
        if [ -z "$ref" ]; then
          echo "::error::could not determine care version: pass 'version' or pin the action to a tag" >&2
          exit 1
        fi
        # goreleaser tags carry a leading v in the URL path but strip it in the
        # asset filename, so keep both forms.
        tag="$ref"; [ "${tag#v}" = "$tag" ] && tag="v$tag"
        version="${tag#v}"

        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "::error::unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=x64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        ext=tar.gz; bin=care
        if [ "$os" = "windows" ]; then ext=zip; bin=care.exe; fi
        asset="care_${version}_${os}_${arch}.${ext}"
        base="https://github.com/toaweme/care/releases/download/${tag}"

        work="$(mktemp -d)"
        cd "$work"

        echo "downloading ${asset} (${tag})"
        curl -fsSL -o "$asset" "${base}/${asset}"
        curl -fsSL -o checksums.txt "${base}/checksums.txt"

        if [ "$CARE_VERIFY" = "true" ]; then
          curl -fsSL -o checksums.txt.sigstore.json "${base}/checksums.txt.sigstore.json"
          echo "verifying cosign signature on checksums.txt"
          # the release workflow signs keyless via GitHub OIDC; the cert SAN is the
          # release.yml workflow at the tag ref. Anchor the regexp to that prefix so
          # one rule covers every tag.
          cosign verify-blob \
            --bundle checksums.txt.sigstore.json \
            --certificate-identity-regexp "^https://github\.com/toaweme/care/\.github/workflows/release\.yml@refs/tags/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            checksums.txt
        else
          echo "::warning::signature verification disabled (verify=false)"
        fi

        echo "verifying sha-256 of ${asset}"
        expected="$(awk -v f="$asset" '$2 == f { print $1 }' checksums.txt)"
        if [ -z "$expected" ]; then
          echo "::error::${asset} not listed in checksums.txt" >&2
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "$asset" | awk '{ print $1 }')"
        else
          actual="$(shasum -a 256 "$asset" | awk '{ print $1 }')"
        fi
        if [ "$expected" != "$actual" ]; then
          echo "::error::checksum mismatch for ${asset}: expected ${expected}, got ${actual}" >&2
          exit 1
        fi

        # bsdtar (macOS, Windows) and GNU tar both extract their respective format;
        # zip only ships for windows, where tar is bsdtar and handles it.
        tar -xf "$asset"
        install_dir="${RUNNER_TEMP}/care-bin"
        mkdir -p "$install_dir"
        mv "$bin" "$install_dir/"
        chmod +x "$install_dir/$bin" || true
        echo "$install_dir" >> "$GITHUB_PATH"

        # clean up the download (archive, checksums, signature); only the binary
        # in install_dir is kept, on PATH for the rest of the job.
        cd /
        rm -rf "$work"
        echo "installed care ${tag} to ${install_dir}"

    - name: Run care
      if: inputs.args != ''
      shell: bash
      env:
        CARE_ARGS: ${{ inputs.args }}
        CARE_DIR: ${{ inputs.dir }}
      run: care --cwd "$CARE_DIR" $CARE_ARGS

    - name: Generate report
      id: report
      # driven by what the user asks to keep, not by publish-url (which defaults
      # non-empty). publishing only happens if one of these produced a report.
      if: inputs.output != '' || inputs.strict == 'true' || inputs.upload == 'true'
      shell: bash
      env:
        CARE_OUTPUT: ${{ inputs.output }}
        CARE_DIR: ${{ inputs.dir }}
      run: |
        set -uo pipefail
        # report lives in the workspace so it survives install cleanup and is
        # reachable by later steps. strict/publish-url imply the default path.
        report="${CARE_OUTPUT:-report.care.json}"
        echo "report-path=$report" >> "$GITHUB_OUTPUT"
        # the artifact is named after the report file, so output is the only place
        # the name is set (artifact names can't contain the path separator).
        echo "artifact-name=$(basename "$report")" >> "$GITHUB_OUTPUT"
        # keep the report at the workspace root even when care runs in a subdir
        # (--cwd), so the upload/publish steps below find it at the relative path.
        report_abs="${GITHUB_WORKSPACE}/${report}"
        # capture care's exit code rather than failing now, so the report still
        # uploads and publishes. the gate step below re-raises it when asked.
        code=0
        care --cwd "$CARE_DIR" status --json --pretty --output "$report_abs" || code=$?
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"

    - name: Upload report artifact
      # always() so a failing-check report is still uploaded before the gate fails.
      if: always() && inputs.upload == 'true'
      # v7.0.1 (https://github.com/actions/upload-artifact/releases/tag/v7.0.1)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ steps.report.outputs.artifact-name }}
        path: ${{ steps.report.outputs.report-path }}
        if-no-files-found: ignore

    - name: Publish report
      # always() so a failing-check report is still published before the gate fails.
      if: always() && inputs.publish-url != ''
      shell: bash
      env:
        CARE_PUBLISH_URL: ${{ inputs.publish-url }}
        CARE_REPORT_PATH: ${{ steps.report.outputs.report-path }}
      run: |
        set -euo pipefail
        url="$CARE_PUBLISH_URL"
        report="$CARE_REPORT_PATH"
        if [ -z "$url" ] || [ ! -s "$report" ]; then
          echo "No report to publish"
          exit 0
        fi
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::warning::skipping publish to ${url} - needs 'permissions: id-token: write' on the job"
          exit 0
        fi
        # audience is the endpoint's origin (scheme + host), which the receiver
        # validates. the URL is POSTed verbatim so any engine's path/query works.
        audience="$(printf '%s' "$url" | sed -E 's#^(https?://[^/]+).*#\1#')"
        token="$(curl -sS \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}" | jq -r .value)"
        curl -fsS -X POST "$url" \
          -H "Authorization: Bearer $token" \
          --data-binary @"$report"
        printf '\nPublished care report to %s\n' "$url"

    - name: Gate on failing checks
      # runs last so the report has already been uploaded and published; re-raises
      # the care exit code captured during report generation.
      if: always() && inputs.strict == 'true'
      shell: bash
      env:
        CARE_EXIT: ${{ steps.report.outputs.exit-code }}
      run: |
        code="${CARE_EXIT:-0}"
        if [ "$code" != "0" ]; then
          echo "::error::care reported failing checks (exit ${code})"
          exit "$code"
        fi

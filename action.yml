name: care
description: Install the care CLI from a verified release and run care status, optionally reporting and publishing.
author: toaweme

branding:
  icon: check-circle
  color: green

inputs:
  version:
    description: >-
      Release tag to install, e.g. v0.1.0. Defaults to the tag the action is pinned
      to (uses: toaweme/care@v0.1.0), so the tag is the single source of truth. Set
      it only when pinning to a SHA or branch.
    required: false
    default: ""
  output:
    description: >-
      Path to write the JSON report to, care's own --output. Use a <name>.care.json
      name. A failing check still writes it rather than failing the step. Omit to
      skip the file.
    required: false
    default: ""
  strict:
    description: >-
      Fail the job when any check fails. The failure is raised last, after
      publishing, so a failing report is still kept.
    required: false
    default: "false"
  publish-url:
    description: >-
      POST the report to this endpoint. care's hosted dashboard is
      https://code.toawe.me/ingest?kind=care. Needs id-token: write to mint the OIDC
      token (audience is the URL origin). Without it publishing is skipped.
    required: false
    default: ""
  verify:
    description: >-
      Verify the cosign signature on checksums.txt before trusting the download.
      Turn off only on air-gapped runners without Sigstore access.
    required: false
    default: "true"
  dir:
    description: >-
      Directory to run care in, its --cwd, for a module in a subdirectory with its
      own go.mod. The report still lands at the workspace root.
    required: false
    default: "."

outputs:
  report-path:
    description: Path to the JSON report in the workspace, empty if none was produced.
    value: ${{ steps.report.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Install cosign
      if: inputs.verify == 'true'
      # v4.1.2 (https://github.com/sigstore/cosign-installer/releases/tag/v4.1.2)
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

    - name: Install care
      shell: bash
      env:
        CARE_VERSION: ${{ inputs.version }}
        CARE_ACTION_REF: ${{ github.action_ref }}
        CARE_VERIFY: ${{ inputs.verify }}
      run: |
        set -euo pipefail

        # the tag drives everything: explicit input wins, else the ref the action
        # was pinned to (GITHUB_ACTION_REF). github.action_ref is passed in env so
        # it survives the action running from its own checkout.
        ref="${CARE_VERSION:-$CARE_ACTION_REF}"
        if [ -z "$ref" ]; then
          echo "::error::could not determine care version: pass 'version' or pin the action to a tag" >&2
          exit 1
        fi
        # goreleaser tags carry a leading v in the URL path but strip it in the
        # asset filename, so keep both forms.
        tag="$ref"; [ "${tag#v}" = "$tag" ] && tag="v$tag"
        version="${tag#v}"

        case "$RUNNER_OS" in
          Linux)   os=linux ;;
          macOS)   os=darwin ;;
          Windows) os=windows ;;
          *) echo "::error::unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=x64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        ext=tar.gz; bin=care
        if [ "$os" = "windows" ]; then ext=zip; bin=care.exe; fi
        asset="care_${version}_${os}_${arch}.${ext}"
        base="https://github.com/toaweme/care/releases/download/${tag}"

        work="$(mktemp -d)"
        cd "$work"

        echo "downloading ${asset} (${tag})"
        curl -fsSL -o "$asset" "${base}/${asset}"
        curl -fsSL -o checksums.txt "${base}/checksums.txt"

        if [ "$CARE_VERIFY" = "true" ]; then
          curl -fsSL -o checksums.txt.sigstore.json "${base}/checksums.txt.sigstore.json"
          echo "verifying cosign signature on checksums.txt"
          # the release workflow signs keyless via GitHub OIDC; the cert SAN is the
          # release.yml workflow at the tag ref. Anchor the regexp to that prefix so
          # one rule covers every tag.
          cosign verify-blob \
            --bundle checksums.txt.sigstore.json \
            --certificate-identity-regexp "^https://github\.com/toaweme/care/\.github/workflows/release\.yml@refs/tags/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            checksums.txt
        else
          echo "::warning::signature verification disabled (verify=false)"
        fi

        echo "verifying sha-256 of ${asset}"
        expected="$(awk -v f="$asset" '$2 == f { print $1 }' checksums.txt)"
        if [ -z "$expected" ]; then
          echo "::error::${asset} not listed in checksums.txt" >&2
          exit 1
        fi
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "$asset" | awk '{ print $1 }')"
        else
          actual="$(shasum -a 256 "$asset" | awk '{ print $1 }')"
        fi
        if [ "$expected" != "$actual" ]; then
          echo "::error::checksum mismatch for ${asset}: expected ${expected}, got ${actual}" >&2
          exit 1
        fi

        # bsdtar (macOS, Windows) and GNU tar both extract their respective format;
        # zip only ships for windows, where tar is bsdtar and handles it.
        tar -xf "$asset"
        install_dir="${RUNNER_TEMP}/care-bin"
        mkdir -p "$install_dir"
        mv "$bin" "$install_dir/"
        chmod +x "$install_dir/$bin" || true
        echo "$install_dir" >> "$GITHUB_PATH"

        # clean up the download (archive, checksums, signature); only the binary
        # in install_dir is kept, on PATH for the rest of the job.
        cd /
        rm -rf "$work"
        echo "installed care ${tag} to ${install_dir}"

    - name: Run care status
      id: report
      # the action's one job: run care status. a report file is written only when it
      # is kept (output) or published (publish-url); strict just needs the captured
      # exit code, so it gates without leaving a file behind. for any other care
      # command, care is already on PATH - run it in your own step.
      shell: bash
      env:
        CARE_OUTPUT: ${{ inputs.output }}
        CARE_PUBLISH_URL: ${{ inputs.publish-url }}
        CARE_DIR: ${{ inputs.dir }}
      run: |
        set -uo pipefail
        # the report lives at the workspace root so it survives install cleanup and
        # the publish step finds it at the relative path even when care ran in a
        # subdir (--cwd).
        report=""; report_flags=""
        if [ -n "$CARE_OUTPUT" ] || [ -n "$CARE_PUBLISH_URL" ]; then
          report="${CARE_OUTPUT:-report.care.json}"
          report_flags="--json --pretty --output ${GITHUB_WORKSPACE}/${report}"
        fi
        echo "report-path=$report" >> "$GITHUB_OUTPUT"
        # capture care's exit code rather than failing now, so a failing report still
        # publishes. the gate step below re-raises it when strict is set.
        code=0
        care --cwd "$CARE_DIR" status $report_flags --expand-install || code=$?
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"

    - name: Publish report
      # publish when there is somewhere to send it and the status step produced a
      # report file. report-path is empty when no report was written (strict-only),
      # so it gates this step without re-deriving the inputs. always() keeps a
      # failing-check report publishing before the gate fails.
      if: always() && inputs.publish-url != '' && steps.report.outputs.report-path != ''
      shell: bash
      env:
        CARE_PUBLISH_URL: ${{ inputs.publish-url }}
        CARE_REPORT_PATH: ${{ steps.report.outputs.report-path }}
      run: |
        set -euo pipefail
        url="$CARE_PUBLISH_URL"
        report="$CARE_REPORT_PATH"
        # the step's if-condition already guarantees url and report-path are set;
        # this only guards the rare case where the file is missing or empty.
        if [ ! -s "$report" ]; then
          echo "No report to publish"
          exit 0
        fi
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
          echo "::warning::skipping publish to ${url} - needs 'permissions: id-token: write' on the job"
          exit 0
        fi
        # audience is the endpoint's origin (scheme + host), which the receiver
        # validates. the URL is POSTed verbatim so any engine's path/query works.
        audience="$(printf '%s' "$url" | sed -E 's#^(https?://[^/]+).*#\1#')"
        token="$(curl -sS \
          -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}" | jq -r .value)"
        curl -fsS -X POST "$url" \
          -H "Authorization: Bearer $token" \
          --data-binary @"$report"
        printf '\nPublished care report to %s\n' "$url"

    - name: Gate on failing checks
      # runs last so the report has already been published; re-raises the care exit
      # code captured during the status run.
      if: always() && inputs.strict == 'true'
      shell: bash
      env:
        CARE_EXIT: ${{ steps.report.outputs.exit-code }}
      run: |
        code="${CARE_EXIT:-0}"
        if [ "$code" != "0" ]; then
          echo "::error::care reported failing checks (exit ${code})"
          exit "$code"
        fi

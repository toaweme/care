name: Tests

on:
  push:
    branches: [main]
    tags: [ "v*" ]
  workflow_dispatch:
  pull_request:

env:
  CODEVIEWER_URL: ${{ vars.CODEVIEWER_URL || 'https://code.toawe.me' }}

permissions:
  id-token: write   # mint the OIDC token; the only permission that matters here
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-quality:
    strategy:
      fail-fast: false
      matrix:
        go: [ 1.26 ]
    runs-on: ubuntu-latest
    steps:
      # v7.0.0 (https://github.com/actions/checkout/releases/tag/v7.0.0)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # v6.5.0 (https://github.com/actions/setup-go/releases/tag/v6.5.0)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: ${{ matrix.go }}

      - name: Install mend
        run: go install github.com/toaweme/mend/cmd/mend@latest

      - name: Generate mend report
        run: mend status --json --pretty --output report.mend.json || true

      - name: Publish report
        run: |
          set -euo pipefail
          [ -s report.mend.json ] || { echo "no report produced; nothing to publish"; exit 0; }
          token="$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$CODEVIEWER_URL" | jq -r .value)"
          curl -fsS -X POST "$CODEVIEWER_URL/ingest?kind=mend" \
            -H "Authorization: Bearer $token" \
            --data-binary @report.mend.json
          echo "\n" && echo "published mend report to $CODEVIEWER_URL"
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release and upload assets
  id-token: write   # mint the OIDC token cosign uses for keyless signing

env:
  # tracks the version the shipped .golangci.yml is validated against.
  GOLANGCI_VERSION: v2.12.2

jobs:
  # gate the release on correctness: a tag only ships if build, vet, tests, and
  # lint pass on the tagged commit, independent of care's own check logic.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # a SHA-pinned caller reads action.yml's version default from the tagged
      # commit, so that default must match the tag or the action installs the
      # wrong release. This gate makes a forgotten bump fail the release loudly
      # instead of shipping a silent mismatch. Use scripts/prepare-release.sh to
      # bump it as part of cutting a release.
      - name: action.yml version default matches the release tag
        run: |
          want="${GITHUB_REF_NAME}"
          got=$(grep -oE 'default: "v[0-9][^"]*"' action.yml | head -1 | sed -E 's/.*"(v[^"]*)".*/\1/')
          if [ "$got" != "$want" ]; then
            echo "::error file=action.yml::version input default is '$got' but the release tag is '$want' - bump it (scripts/prepare-release.sh) in the release commit, then re-tag" >&2
            exit 1
          fi
          echo "action.yml version default matches $want"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: ${{ env.GOLANGCI_VERSION }}

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod   # same toolchain the gate tested with

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # care generates its own conventional-commit notes (the org's single
      # source), which goreleaser then uses verbatim via --release-notes. Built
      # from the tagged source, so the release bootstraps its own tooling.
      # Written to the runner temp dir, not the work tree: a release-notes file in
      # the repo would leave git dirty and goreleaser's --clean check would abort.
      # tee echoes the notes into the job log so an empty/odd result is visible,
      # and a non-empty guard substitutes a minimal fallback rather than shipping
      # an empty release body.
      - name: Generate release notes
        run: |
          notes="$RUNNER_TEMP/notes.md"
          go run ./cmd/care changelog | tee "$notes" || true
          if [ ! -s "$notes" ]; then
            echo "::warning::care changelog produced empty notes; using fallback"
            echo "See the commit history for changes in this release." > "$notes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2" # lock to the GoReleaser v2 line; v3 won't silently break the run
          args: release --clean --release-notes=${{ runner.temp }}/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to toaweme/homebrew-tap so goreleaser can
          # push the updated formula. Set as an org or repo secret.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # PAT with write access to toaweme/scoop-bucket so goreleaser can
          # push the updated Scoop manifest. Set as an org or repo secret.
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

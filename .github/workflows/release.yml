name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release and upload assets
  id-token: write   # mint the OIDC token cosign uses for keyless signing

env:
  # tracks the version the shipped .golangci.yml is validated against.
  GOLANGCI_VERSION: v2.12.2

jobs:
  # gate the release on correctness: a tag only ships if build, vet, tests, and
  # lint pass on the tagged commit, independent of care's own check logic.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # v7.0.0 (https://github.com/actions/checkout/releases/tag/v7.0.0)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # v6.5.0 (https://github.com/actions/setup-go/releases/tag/v6.5.0)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race

      - name: golangci-lint
        # v9.2.1 (https://github.com/golangci/golangci-lint-action/releases/tag/v9.2.1)
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: ${{ env.GOLANGCI_VERSION }}

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      # v7.0.0 (https://github.com/actions/checkout/releases/tag/v7.0.0)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog

      # v6.5.0 (https://github.com/actions/setup-go/releases/tag/v6.5.0)
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod   # same toolchain the gate tested with

      # v4.1.2 (https://github.com/sigstore/cosign-installer/releases/tag/v4.1.2)
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      # care generates its own conventional-commit notes (the org's single
      # source), which goreleaser then uses verbatim via --release-notes. Built
      # from the tagged source, so the release bootstraps its own tooling.
      # Written to the runner temp dir, not the work tree: a release-notes file in
      # the repo would leave git dirty and goreleaser's --clean check would abort.
      # tee echoes the notes into the job log so an empty/odd result is visible,
      # and a non-empty guard substitutes a minimal fallback rather than shipping
      # an empty release body.
      - name: Generate release notes
        run: |
          notes="$RUNNER_TEMP/notes.md"
          go run ./cmd/care changelog | tee "$notes" || true
          if [ ! -s "$notes" ]; then
            echo "::warning::care changelog produced empty notes; using fallback"
            echo "See the commit history for changes in this release." > "$notes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # v7.2.2 (https://github.com/goreleaser/goreleaser-action/releases/tag/v7.2.2)
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
        with:
          version: "~> v2" # lock to the GoReleaser v2 line; v3 won't silently break the run
          args: release --clean --release-notes=${{ runner.temp }}/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to toaweme/homebrew-tap so goreleaser can
          # push the updated formula. Set as an org or repo secret.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

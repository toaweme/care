name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # tracks the version the shipped .golangci.yml is validated against.
  GOLANGCI_VERSION: v2.12.2

jobs:
  # one flat gate: raw upstream checks on the single Go version from go.mod, then
  # run the stable released care on itself through our own action. id-token is
  # needed to publish the report to the care dashboard.
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: ${{ env.GOLANGCI_VERSION }}

      - name: Resolve latest care release
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "tag=$(gh release view --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"

      - uses: ./
        with:
          version: ${{ steps.rel.outputs.tag }}
          publish-url: https://code.toawe.me/ingest?kind=care
